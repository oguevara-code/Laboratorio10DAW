<h1>Juego del Ahorcado</h1>

<h2>{{ obtenerPalabraOculta() }}</h2>

<input 
    type="text"
    maxlength="1"
    [(ngModel)]="letraIngresada"
    [disabled]="juegoTerminado"
/>

<button 
    (click)="intentarLetra()"
    [disabled]="juegoTerminado">
    Intentar
</button>

<p>Errores: {{ errores }}/{{ maxErrores }}</p>

@if (mensaje !== '') {
    <h3>{{ mensaje }}</h3>
}

<button (click)="reiniciarJuego()">
    Reiniciar Juego
</button>
